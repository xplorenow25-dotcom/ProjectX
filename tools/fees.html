<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Fees Calculator | CryptoMetricPro</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- INCLUDE NAVBAR HERE -->

    <main class="container">
        <div class="calc-wrapper card">
            <h2>Exchange Fee Calculator</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Calculate exactly how much an exchange takes.</p>

            <div class="input-group">
                <label for="trade-size">Total Trade Size</label>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="trade-size" placeholder="e.g. 10000" min="0" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label for="fee-pct">Maker/Taker Fee (%)</label>
                <input type="number" id="fee-pct" placeholder="e.g. 0.1" min="0" step="0.01" value="0.1">
            </div>

            <div class="result-box">
                <h4>Total Fee Paid</h4>
                <div class="result-value loss">
                    -<span class="currency-symbol">$</span><span id="fee-amount">0.00</span>
                </div>
            </div>
        </div>
    </main>

    <!-- INCLUDE FOOTER HERE -->
    <script src="../js/main.js"></script>
    <script src="../js/fees.js"></script>
</body>
</html>
